<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#0a0e17" stroke="url(#grad)" stroke-width="3"/>
  <g fill="url(#grad)" filter="url(#glow)">
    <rect x="20" y="30" width="25" height="8" rx="2"/>
    <rect x="30" y="45" width="35" height="8" rx="2"/>
    <rect x="25" y="60" width="50" height="8" rx="2"/>
  </g>
</svg>
